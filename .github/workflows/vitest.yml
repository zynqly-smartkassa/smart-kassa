name: Vitest Unit Tests

on:
  push:
    branches:
      - "*"
      - "*/*"
      - "**"
  pull_request:
    branches:
      - "*"
      - "*/*"
      - "**"

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ required for @react-email packages (EBADENGINE otherwise)
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run Vitetest Tests
        run: npx vitest --reporter=junit --outputFile=test-results.xml
        working-directory: frontend

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: failure()
        with:
          name: Vitest Results
          path: test-results.xml
          reporter: java-junit
          working-directory: frontend

  # Deploys only when playwright.yml does NOT already deploy
  # playwright.yml deploys on: push→main, push→develop, PR→main
  deploy:
    name: Deploy to Vercel (Preview)
    needs: [unit-test]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop') ||
      (github.event_name == 'pull_request' && github.base_ref != 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview)
        run: vercel --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
