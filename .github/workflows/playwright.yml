name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20.6+ required for --env-file flag in dev:test script
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browser + system dependencies
        run: npx playwright install --with-deps ${{ matrix.browser }}
        working-directory: frontend

      # Creates backend/.env.test from GitHub Secrets
      - name: Create backend/.env.test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          printf '%s\n' \
            "DATABASE_URL=${DATABASE_URL}" \
            "JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}" \
            "JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}" \
            "NODE_ENV=test" \
            "PORT=3000" \
            "HOST=0.0.0.0" \
            > backend/.env.test

      # VITE_API_URL is on Testing Environment on the localhost:3000
      - name: Create frontend/.env.local
        run: echo "VITE_API_URL=http://localhost:3000" > frontend/.env.local

      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          retention-days: 14
